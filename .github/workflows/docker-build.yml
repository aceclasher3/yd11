name: Build & Push Docker Image

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build & Push (stable)
        run: |
          docker build \
            --network=host \
            -t ghcr.io/${{ github.repository_owner }}/ytdlp-runtime:latest \
            .

          docker push ghcr.io/${{ github.repository_owner }}/ytdlp-runtime:latest
